#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "calcom"
name = "cal.com"
description.en = "Appointment scheduling application"
description.fr = "Application de planification de rendez-vous"

version = "5.9.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "AGPL-3.0"
website = "https://cal.com/"
code = "https://github.com/calcom"

[integration]
yunohost = ">= 12.1.28"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "8G"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/calcom/cal.com/archive/refs/tags/v5.9.0.tar.gz"
    sha256 = "6c795f7e13671a7a5f0d52fcd1f839f2ef08346202bb36f94494fd2baafb2aab"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 3000

    [resources.apt]
    packages = "postgresql, yarn"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "22"
