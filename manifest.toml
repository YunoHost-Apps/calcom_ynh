#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "calcom"
name = "cal.com"
description.en = "Appointment scheduling application"
description.fr = "Application de planification de rendez-vous"

version = "6.2.0~ynh1"

maintainers = ["CodeShakingSheep"]

[upstream]
license = "AGPL-3.0"
website = "https://cal.com/"
code = "https://github.com/calcom/cal.com"

[integration]
yunohost = ">= 12.1.28"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "2G"
ram.runtime = "1G"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
	url = "https://github.com/calcom/cal.com/archive/refs/tags/v6.2.0.tar.gz"
	sha256 = "ca7a7a1ed94312973cf2568e025675669c63ed1a5be0c04e95ec70e763d44d49"
        prefetch = false

        autoupdate.strategy = "latest_github_release"

    [resources.sources.calcom_prebuilt]
	url = "https://github.com/CodeShakingSheep/calcom-build/releases/download/calcom-v6.2.0/calcom-v6.2.0.tar.gz"
	sha256 = "95e41733e9829456f000a310d3b57710e8a1d31692e8fa68c8171304dd3f04dd"
        autoupdate.strategy = "latest_github_release"
	autoupdate.upstream = "https://github.com/CodeShakingSheep/calcom-build"
        autoupdate.asset = "^calcom-v.*\\.tar.gz$"

    [resources.system_user]
    allow_email = true
	
    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 3000

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "20"
