#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "calcom"
name = "cal.com"
description.en = "Appointment scheduling application"
description.fr = "Application de planification de rendez-vous"

version = "6.0.0~ynh1"

maintainers = ["CodeShakingSheep"]

[upstream]
license = "AGPL-3.0"
website = "https://cal.com/"
code = "https://github.com/calcom/cal.com"

[integration]
yunohost = ">= 12.1.28"
architectures = "all"
multi_instance = false

ldap = false

sso = false

disk = "50M"
ram.build = "8G"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/calcom/cal.com/archive/refs/tags/v6.0.0.tar.gz"
    sha256 = "dea407d7cb877a674f2c95981fd176c54897daf24336d45b4ee1e68e93274335"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 3000

    [resources.apt]
    packages = "postgresql, yarn"

    [resources.database]
    type = "postgresql"
