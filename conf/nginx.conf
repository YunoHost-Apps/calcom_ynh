#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;

# Custom for iFrame embedding
more_set_headers "X-Frame-Options : ALLOW-FROM self __MAIN_DOMAIN__ *.__MAIN_DOMAIN__";
more_set_headers "Content-Security-Policy : frame-ancestors self __MAIN_DOMAIN__ *.__MAIN_DOMAIN__";

location __PATH__/ {

        proxy_pass http://127.0.0.1:__PORT__/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
}
